<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vent Control</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Vent Control</h1>

      <div class="card">
        <div class="section-title">Navigation</div>
        <div class="action-row">
          <a class="btn btn-default" href="/">Home</a>
        </div>
        <p class="hint">
          GET:
          <a class="mono" href="/hw_details">/hw_details</a>
          <a class="mono" href="/status">/status</a>
          <a class="mono" href="/style.css">/style.css</a>
        </p>
        <p class="hint">
          POST:
          <span class="mono">/servo/close</span>
          <span class="mono">/servo/middle</span>
          <span class="mono">/servo/open</span>
          <span class="mono">/update</span>
        </p>
      </div>

      <div class="sep"></div>

      <!-- ===== LED Status ===== -->
      <div class="columns">
        <div class="card">
          <div class="section-title">LED Status</div>
          <div class="action-row" style="gap: 24px">
            <div class="led-indicator">
              <span id="led-open-dot" class="led-dot led-off"></span>
              <span>OPEN (green)</span>
            </div>
            <div class="led-indicator">
              <span id="led-closed-dot" class="led-dot led-off"></span>
              <span>CLOSED (red)</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== Motor Control ===== -->
      <div class="card">
        <div class="section-title">Motor Control (SG90)</div>

        <div class="action-row" style="align-items: flex-end; gap: 16px; flex-wrap: wrap">
          <button class="btn btn-default" type="button" onclick="sendCommand('close')">Close</button>
          <button class="btn btn-default" type="button" onclick="sendCommand('middle')">Mid</button>
          <button class="btn btn-default" type="button" onclick="sendCommand('open')">On</button>
        </div>
        <div class="metric" style="margin-top: 10px">
          <span class="value" id="servo-angle">0</span>
          <span class="unit">&deg;</span>
          <span class="hint" style="margin-left: 8px">current position</span>
        </div>
      </div>

      <script>
        'use strict';
        const $ = (id) => document.getElementById(id);

        async function pollStatus() {
          try {
            const r = await fetch('/status', { cache: 'no-store' });
            if (!r.ok) return;
            const s = await r.json();
            $('servo-angle').textContent = String(s.servo_angle);
            $('led-open-dot').className = 'led-dot ' + (s.vent_open ? 'led-green' : 'led-off');
            $('led-closed-dot').className = 'led-dot ' + (s.vent_open ? 'led-off' : 'led-red');
          } catch (_) {}
        }

        async function sendCommand(action) {
          try {
            const r = await fetch('/servo/' + action, { method: 'POST' });
            if (r.ok) {
              const j = await r.json();
              $('servo-angle').textContent = String(j.angle);
            }
          } catch (_) {}
          pollStatus();
        }

        document.addEventListener('DOMContentLoaded', function () {
          pollStatus();
          setInterval(pollStatus, 2000);
        });
      </script>
    </div>
  </body>
</html>
