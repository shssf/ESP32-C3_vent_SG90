<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vent Servo Controller</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Vent Servo Controller &mdash; XIAO ESP32-C3</h1>

      <div class="card">
        <div class="section-title">Navigation</div>
        <div class="action-row">
          <a class="btn btn-primary" href="/control">Vent control</a>
          <a class="btn btn-accent" href="/ota">Firmware update</a>
        </div>
        <p class="hint">
          GET:
          <a class="mono" href="/hw_details">/hw_details</a>
          <a class="mono" href="/status">/status</a>
          <a class="mono" href="/style.css">/style.css</a>
        </p>
        <p class="hint">
          POST:
          <span class="mono">/servo</span>
          <span class="mono">/update</span>
        </p>
      </div>

      <div id="err" class="status-pill status-error" style="display: none"></div>

      <div class="sep"></div>

      <div class="columns">
        <div class="card">
          <div class="section-title">Device</div>
          <table id="tbl-dev"></table>
        </div>
        <div class="card">
          <div class="section-title">Network</div>
          <table id="tbl-net"></table>
        </div>
        <div class="card">
          <div class="section-title">Memory &amp; Flash</div>
          <table id="tbl-mem"></table>
        </div>
      </div>

      <div class="columns">
        <div class="card">
          <div class="section-title">RTOS</div>
          <table id="tbl-rtos"></table>
        </div>
        <div class="card">
          <div class="section-title">Flash partitions</div>
          <table id="tbl-part"></table>
        </div>
      </div>

      <script>
        'use strict';
        const $ = (id) => document.getElementById(id);

        function row4(th1, td1, th2, td2) {
          return `<tr><th>${th1}</th><td>${td1}</td><th>${th2}</th><td>${td2}</td></tr>`;
        }
        function row2(th, td) {
          return `<tr><th>${th}</th><td colspan="3">${td}</td></tr>`;
        }

        async function loadDiag() {
          const errEl = $('err');
          errEl.style.display = 'none';
          errEl.textContent = '';
          try {
            const r = await fetch('/hw_details', { cache: 'no-store' });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const j = await r.json();

            $('tbl-dev').innerHTML = [
              row4('Target', j.soc.target, 'Model', j.soc.model),
              row4('Cores', String(j.soc.cores), 'Revision', String(j.soc.revision)),
              row4('Uptime', j.misc.uptime, 'Disc age', j.wifi.last_disc_age),
              row4(
                'Chip temp',
                typeof j.misc.chip_temp_c === 'number' ? j.misc.chip_temp_c.toFixed(1) + ' \u00b0C' : '-',
                'Reset',
                `${j.misc.reset_reason} (${j.misc.reset_code})`
              ),
              row2('Build', `IDF: ${j.build.idf}, ${j.build.date} ${j.build.time}`),
              row2(
                'Security',
                `Secure boot: ${j.sec.secure_boot}, Flash enc: ${j.sec.flash_enc}, JTAG disabled: ${j.sec.jtag_disabled}`
              ),
            ].join('');

            $('tbl-net').innerHTML = [
              row2('Hostname', j.net.hostname),
              row2('STA MAC', j.net.mac_sta),
              row2('IP/GW/Mask', `${j.net.ip}<br>${j.net.gw}<br>${j.net.mask}`),
              row2('DNS', `${j.net.dns1}<br>${j.net.dns2}`),
              row2(
                'WiFi link',
                `SSID: ${j.wifi.ssid}<br>RSSI: ${j.wifi.rssi} dBm<br>Channel: ${j.wifi.channel}<br>BSSID: ${j.wifi.bssid}`
              ),
              row2(
                'WiFi radio',
                `Proto: ${j.wifi.proto},<br>BW: ${j.wifi.bw},<br>MaxTx: ${j.wifi.max_tx_dbm} dBm,<br>Country: ${j.wifi.country}`
              ),
            ].join('');

            $('tbl-mem').innerHTML = [
              row2(
                'Flash',
                `Size: ${j.flash.size}, JEDEC: ${j.flash.jedec_hex}, Vendor: ${j.flash.vendor}, Mode: ${j.flash.mode}, Speed: ${j.flash.speed_hz} Hz`
              ),
              row2(
                'Heap (8-bit)',
                `Total: ${j.heap.total}, Free: ${j.heap.free}, MinEverFree: ${j.heap.min_free}, Largest: ${j.heap.largest}`
              ),
              row2('Heap (caps)', `InternalFree: ${j.heap.internal_free}, SPIRAMFree: ${j.heap.spiram_free}`),
              row2('PSRAM', `State: ${j.psram.state}, Size: ${j.psram.size}`),
              row2('OTA', `Running: ${j.ota.running_size}, Next: ${j.ota.next_size}`),
            ].join('');

            $('tbl-rtos').innerHTML =
              `<tr><th>Task</th><th>Prio</th><th>State</th><th>Stack free min</th></tr>` +
              j.rtos.tasks
                .map(
                  (t) =>
                    `<tr><td class="mono">${t.name}</td><td>${t.prio}</td><td>${t.state}</td><td>${t.stack_min}</td></tr>`
                )
                .join('');

            $('tbl-part').innerHTML =
              `<tr><th>Label</th><th>Type</th><th>Subtype</th><th>Addr</th><th>Size</th></tr>` +
              j.partitions
                .map(
                  (p) =>
                    `<tr><td class="mono">${p.label}</td><td>${p.type}</td><td>${p.subtype}</td><td class="mono">${p.addr}</td><td>${p.size}</td></tr>`
                )
                .join('');
          } catch (e) {
            errEl.textContent = 'Load failed: ' + e;
            errEl.style.display = 'inline-block';
          }
        }

        document.addEventListener('DOMContentLoaded', loadDiag, false);
      </script>
    </div>
  </body>
</html>
